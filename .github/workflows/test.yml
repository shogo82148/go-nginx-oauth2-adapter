name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies for building nginx and h2o
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre3 libpcre3-dev
      - name: Check out code into the Go module directory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      # - name: restore h2o binary
      #   uses: actions/cache@v5
      #   with:
      #     path: .github/h2o
      #     key: ${{ runner.os }}-h2o-${{ hashFiles('.github/install-h2o.sh') }}

      - name: restore nginx binary
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .github/nginx
          key: ${{ runner.os }}-nginx-${{ hashFiles('.github/install-nginx.sh') }}

      # FIXME: h2o doesn't work with OpenSSL v3.
      # - name: install h2o for test
      #   run: .github/install-h2o.sh

      - name: install nginx for test
        run: .github/install-nginx.sh

      - name: download dependencies
        run: go mod download
      - name: Test
        run: |
          make test

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
      - name: Check GoReleaser configure
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: check
